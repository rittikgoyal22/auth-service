spring.application.name=auth-service
server.port=8080

# Connects to account-management's H2 TCP server (started by H2ServerConfig on port 9092).
# account-management must be running before this service starts.
spring.datasource.url=jdbc:h2:tcp://localhost:9092/~/data/account_management
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# none — account-management owns and manages the schema
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=etdTravelDeskJwtSecretKey1234567890ABCDEF
